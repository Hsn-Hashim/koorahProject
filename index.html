<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تجربة API الكورة</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <h1 id="head">نتائج الدوريات الاوروبية</h1>
    <div class="league-selector">
    <label for="leagueSelect" style="color: white;">اختر الدوري:</label>
    <select id="leagueSelect" onchange="changeLeague()">
        <option value="PL">🏴󠁧󠁢 الدوري الإنجليزي</option>
        <option value="PD">🇪🇸 الدوري الإسباني</option>
        <option value="BL1">🇩🇪 الدوري الألماني</option>
        <option value="SA">🇮🇹 الدوري الإيطالي</option>
        <option value="FL1">🇫🇷 الدوري الفرنسي</option>
    </select>
</div>
    <label for="date" style="color: white;">ادخل تاريخ المباريات</label>
    <input type="date" id="matchDate"><br>
    
    <button onclick="getMatches()">عرض البيانات</button>
    <button onclick="getTodayMatches()"> عرض بيانات اليوم</button>
    <button onclick="getPlayingMatches()"> عرض المباريات الجارية</button>
    <button onclick="getStandings()"> عرض الترتيب</button>
    <div id="results"></div>

    <script src="javaScript.js"></script>
</body>
</html>
